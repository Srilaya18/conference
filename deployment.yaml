apiVersion: apps/v1
kind: Deployment
metadata:
  name: conference-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conference-app
  template:
    metadata:
      labels:
        app: conference-app
    spec:
      containers:
      - name: conference-app
        image: srilayam/conference-app:latest   # ⚠️ your DockerHub username
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: conference-service
spec:
  type: NodePort
  selector:
    app: conference-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30011